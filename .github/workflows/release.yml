name: Build & Release

# v1.0.0 のようなタグを push するとビルド→Releaseへ配布ファイルを公開する。
# 手動実行（workflow_dispatch）ではビルド確認のみ（Releaseはしない）。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            built: dist/KenpoAssist.exe
            asset: KenpoAssist-windows.exe
          - os: macos-latest
            built: dist/KenpoAssist
            asset: KenpoAssist-macos
          - os: ubuntu-latest
            built: dist/KenpoAssist
            asset: KenpoAssist-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-build.txt
      - name: Build (PyInstaller)
        run: pyinstaller --noconfirm kenpo-support.spec
      - name: Rename artifact
        shell: bash
        run: cp "${{ matrix.built }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
